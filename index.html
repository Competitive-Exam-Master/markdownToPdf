<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown & MathJax App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Dark mode styles */
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode .modal-content, body.dark-mode #markdown-editor, body.dark-mode #rendered-output {
            background-color: #1e1e1e; color: #e0e0e0; border-color: #333;
        }
        body.dark-mode .header button { background-color: #bb86fc; color: black; }
        body.dark-mode .header button:hover { background-color: #3700b3; }
        body.dark-mode .settings-grid input[type="color"] { border: 1px solid #e0e0e0; }
        body.dark-mode .settings-grid input, body.dark-mode .settings-grid select {
            background-color: #333; color: #e0e0e0; border-color: #555;
        }
        body.dark-mode .toc { background-color: #2c2c2c; border-color: #555; }
        body.dark-mode a { color: #bb86fc; }

        /* Table Styles */
        #rendered-output table, #pdf-preview-box table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
        #rendered-output th, #rendered-output td, #pdf-preview-box th, #pdf-preview-box td {
            border: 1px solid #ccc; padding: 8px 12px; text-align: left;
        }
        #rendered-output th, #pdf-preview-box th { background-color: rgba(0, 0, 0, 0.05); font-weight: bold; }
        body.dark-mode #rendered-output th, body.dark-mode #rendered-output td { border-color: #444; }
        body.dark-mode #rendered-output th { background-color: rgba(255, 255, 255, 0.1); }
        body.grayscale-print #rendered-output { filter: grayscale(100%); }

        .header {
            display: flex; justify-content: flex-end; align-items: center;
            overflow-x: auto; white-space: nowrap; padding-bottom: 5px;
        }
        .toolbar-buttons { display: flex; gap: 10px; flex-wrap: nowrap; min-width: 100%; }
        .header button {
            padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px;
            background-color: #007bff; color: white; transition: 0.3s ease;
            flex-shrink: 0; font-size: 20px;
        }
        .header button:hover { background-color: #0056b3; }

        #markdown-editor, #rendered-output {
            width: 100%; height: 70vh; padding: 15px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 8px; background-color: white; font-size: 16px;
        }
        #markdown-editor { resize: vertical; font-family: monospace; display: block; }
        #rendered-output { overflow-y: auto; display: none; }
        
        .toc { border: 1px solid #ddd; padding: 10px; margin-bottom: 20px; border-radius: 5px; background-color: #f9f9f9; }
        .toc h4 { margin-top: 0; margin-bottom: 10px; }
        .toc ul { list-style: none; padding-left: 0; }
        .toc li { margin-bottom: 5px; }
        .toc a { text-decoration: none; color: #007bff; }

        /* Modals */
        .modal {
            display: none; position: fixed; z-index: 10; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #fff; margin: 5% auto; padding: 20px; border: 1px solid #888; 
            width: 80%; max-width: 600px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); position: relative;
        }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: black; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .settings-grid div { display: flex; flex-direction: column; }
        .radio-group { display: flex; gap: 15px; align-items: center; }
        .radio-group label { margin-bottom: 0; font-weight: normal; }
        .settings-grid label, .pdf-controls label { margin-bottom: 5px; font-weight: bold; }
        .settings-grid .checkbox-container { flex-direction: row; align-items: center; display: flex; gap: 5px; }
        .settings-grid input[type="number"], .settings-grid input[type="color"], 
        .settings-grid select, .pdf-controls select, .pdf-controls input[type="number"] {
            padding: 8px; border-radius: 5px; border: 1px solid #ccc;
        }
        
        .settings-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .settings-actions button, .pdf-controls button {
            padding: 10px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;
        }
        .settings-actions .add-test-markdown-btn { background-color: #17a2b8; }
        .settings-actions button:hover, .pdf-controls button:hover { opacity: 0.8; }

        /* PDF Share Modal Styles */
        #pdf-share-modal .modal-content { max-width: 1100px; }
        .pdf-panel-body { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; }
        .pdf-controls {
            flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 15px;
            background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee;
        }
        body.dark-mode .pdf-controls { background-color: #2c2c2c; border-color: #444; }
        
        .scale-control { display: flex; align-items: center; gap: 10px; width: 100%; }
        .scale-btn {
            background-color: #6c757d; color: white; border: none; border-radius: 4px;
            width: 35px; height: 35px; font-size: 20px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; padding: 0;
        }
        .scale-btn:hover { background-color: #5a6268; }

        .pdf-preview-wrapper {
            flex: 2; min-width: 300px; height: 600px; background: #525659;
            padding: 20px; overflow: auto; border-radius: 8px; text-align: center;
        }
        
        #pdf-desk-container { display: inline-block; text-align: left; zoom: 0.6; transition: zoom 0.2s; }
        
        #pdf-desk {
            background-color: white; width: var(--pw, 210mm);
            padding: var(--mt, 25.4mm) var(--mr, 25.4mm) 0 var(--ml, 25.4mm);
            box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative;
        }
        
        #pdf-preview-box {
            color: black; width: 100%; min-height: var(--ch, 246.2mm); box-sizing: border-box; 
            font-size: var(--base-font-size, 16px); position: relative; background-color: white;
        }
        
        #pdf-page-overlays {
            position: absolute; top: var(--mt, 25.4mm); left: var(--ml, 25.4mm); 
            width: calc(var(--pw, 210mm) - var(--ml, 25.4mm) - var(--mr, 25.4mm));
            pointer-events: none; z-index: 5;
        }

        .pdf-custom-margin-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
        .pdf-custom-margin-row div { display: flex; flex-direction: column; width: 45%; }
        .pdf-custom-margin-row input { width: 100%; box-sizing: border-box; }
        
        /* Page Selection Styles */
        #page-selection-container { margin-top: 10px; padding-top: 10px; border-top: 1px solid #ccc; }
        #page-checkboxes { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
        .page-checkbox-label {
            display: flex; align-items: center; gap: 4px; font-weight: normal; 
            background: #e9ecef; padding: 4px 8px; border-radius: 4px; cursor: pointer;
        }
        body.dark-mode .page-checkbox-label { background: #444; }
        
        /* FIX: Precise Print Normalization */
        @media print {
            @page { margin: 20mm; }
            body { padding: 0 !important; margin: 0 !important; background-color: white !important; color: black !important; }
            .header, #markdown-editor, .modal { display: none !important; }
            #rendered-output { 
                display: block !important; height: auto !important; overflow: visible !important; 
                border: none !important; padding: 0 !important; margin: 0 !important; box-shadow: none !important;
            }
            body.grayscale-print h1, body.grayscale-print h2, body.grayscale-print h3, body.grayscale-print p,
            body.grayscale-print strong, body.grayscale-print em, body.grayscale-print td {
                color: black !important; border-color: black !important;
            }
            body.grayscale-print mjx-container, body.grayscale-print mjx-container svg { 
                color: black !important; fill: black !important; 
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="toolbar-buttons">
            <button id="toggle-view-btn" title="Toggle View">↔️</button>
            <button id="clear-btn" title="Clear All">🗑️</button>
            <button id="open-btn" title="Open File">📂</button>
            <button id="download-btn" title="Download MD">💾</button>
            <button id="print-btn" title="Print Native">🖨️</button>
            <button id="share-pdf-btn" title="Share PDF">📤</button>
            <button id="settings-btn" title="Settings">⚙️</button>
        </div>
    </div>

    <input type="file" id="file-input" accept=".md,.txt" style="display: none;">

    <textarea id="markdown-editor" placeholder="Start typing your markdown here..."></textarea>
    <div id="rendered-output"></div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-settings">&times;</span>
            <h2>Settings</h2>
            <div class="settings-grid">
                <div>
                    <label for="font-family-select">Font Family:</label>
                    <select id="font-family-select">
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="'Times New Roman', serif">Times New Roman</option>
                        <option value="'Courier New', monospace">Courier New</option>
                        <option value="Verdana, sans-serif">Verdana</option>
                    </select>
                </div>
                <div>
                    <label>Theme:</label>
                    <div class="radio-group">
                        <input type="radio" id="light-theme" name="theme" value="light">
                        <label for="light-theme">Light</label>
                        <input type="radio" id="dark-theme" name="theme" value="dark">
                        <label for="dark-theme">Dark</label>
                    </div>
                </div>
                <div><label>Heading 1 Color:</label><input type="color" id="h1-color" value="#333333"></div>
                <div><label>Heading 2 Color:</label><input type="color" id="h2-color" value="#444444"></div>
                <div><label>Heading 3 Color:</label><input type="color" id="h3-color" value="#555555"></div>
                <div><label>Italics Color:</label><input type="color" id="italics-color" value="#777777"></div>
                <div><label>Heading 1 Size (px):</label><input type="number" id="h1-size" value="28"></div>
                <div><label>Heading 2 Size (px):</label><input type="number" id="h2-size" value="24"></div>
                <div><label>Heading 3 Size (px):</label><input type="number" id="h3-size" value="20"></div>
                <div><label>Bold Text Color:</label><input type="color" id="bold-color" value="#000000"></div>
                <div><label>MathJax Color:</label><input type="color" id="math-color" value="#555555"></div>
                <div><label>MathJax Size (em):</label><input type="number" id="math-size" value="1" step="0.1"></div>
                <div class="checkbox-container"><input type="checkbox" id="generate-toc-checkbox"><label>Generate Table of Contents</label></div>
                <div>
                    <label>Print Type:</label>
                    <div class="radio-group">
                        <input type="radio" id="color-print" name="print-type" value="color" checked><label>Color</label>
                        <input type="radio" id="grayscale-print" name="print-type" value="grayscale"><label>B&W</label>
                    </div>
                </div>
            </div>
            <div class="settings-actions">
                <button class="add-test-markdown-btn" id="add-test-btn">Add Test Markdown</button>
                <button id="save-settings-btn">Save Settings</button>
            </div>
        </div>
    </div>

    <div id="pdf-share-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-pdf-modal">&times;</span>
            <h2>Share PDF & Live Layout</h2>
            <div class="pdf-panel-body">
                <div class="pdf-controls">
                    <div>
                        <label>Content Scale: <span id="pdf-scale-val">100%</span></label>
                        <div class="scale-control">
                            <button type="button" class="scale-btn" id="scale-down-btn">-</button>
                            <input type="range" id="pdf-scale" min="50" max="200" value="100" style="flex-grow: 1;">
                            <button type="button" class="scale-btn" id="scale-up-btn">+</button>
                        </div>
                        <small style="color:#666;">Scales text and math to fit exactly how you want.</small>
                    </div>
                    <div>
                        <label>Orientation:</label>
                        <select id="pdf-orientation">
                            <option value="portrait">Portrait (A4)</option>
                            <option value="landscape">Landscape (A4)</option>
                        </select>
                    </div>
                    <div>
                        <label>Pages per Sheet:</label>
                        <select id="pdf-layout">
                            <option value="1">1 Page (Standard)</option>
                            <option value="2">2 Pages (Continuous Split)</option>
                            <option value="2-duplicate">2 Pages (Identical Left/Right)</option>
                        </select>
                    </div>
                    <div>
                        <label>Margins:</label>
                        <select id="pdf-margins">
                            <option value="normal" data-val="25.4">Normal (1 inch)</option>
                            <option value="narrow" data-val="12.7" selected>Narrow (0.5 inch)</option>
                            <option value="custom">Custom (mm)...</option>
                        </select>
                    </div>
                    <div id="custom-margins-div" class="pdf-custom-margin-row" style="display:none;">
                        <div><label>Top</label><input type="number" id="m-top" value="25.4" step="1"></div>
                        <div><label>Bottom</label><input type="number" id="m-bot" value="25.4" step="1"></div>
                        <div><label>Left</label><input type="number" id="m-left" value="25.4" step="1"></div>
                        <div><label>Right</label><input type="number" id="m-right" value="25.4" step="1"></div>
                    </div>
                    
                    <div id="page-selection-container">
                        <label>Select Pages to Include:</label>
                        <div id="page-checkboxes"></div>
                    </div>
                    
                    <button id="execute-share-btn" style="margin-top: auto;">Generate & Share PDF</button>
                </div>
                <div class="pdf-preview-wrapper">
                    <div id="pdf-desk-container">
                        <div id="pdf-desk">
                            <div id="pdf-preview-box"></div>
                            <div id="pdf-page-overlays"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], processEscapes: true },
            svg: { fontCache: 'none' },
            options: { ignoreHtmlClass: 'tex2jax_ignore', processHtmlClass: 'tex2jax_process' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    
    <script>
        const editor = document.getElementById('markdown-editor');
        const output = document.getElementById('rendered-output');
        const toggleBtn = document.getElementById('toggle-view-btn');
        const pdfModal = document.getElementById('pdf-share-modal');
        const executeShareBtn = document.getElementById('execute-share-btn');
        const pdfPreviewBox = document.getElementById('pdf-preview-box');
        const deskContainer = document.getElementById('pdf-desk-container');
        const pdfDesk = document.getElementById('pdf-desk');

        let isEditorView = true;
        let pdfUpdateTimer = null;

        function saveEditorContent() { localStorage.setItem('markdownContent', editor.value); }
        function loadEditorContent() {
            const savedContent = localStorage.getItem('markdownContent');
            if (savedContent) editor.value = savedContent;
        }

        function renderContent() {
            const markdownText = editor.value;
            let processedText = markdownText.replace(/(\$\$?)([\s\S]*?)\1/g, (match, delimiter, mathContent) => {
                let fixedContent = mathContent.replace(/\\%/g, '%').replace(/%/g, '\\\\%')
                    .replace(/\\#/g, '#').replace(/#/g, '\\\\#').replace(/₹/g, '\\text{₹}');
                return delimiter + fixedContent + delimiter;
            });
            processedText = processedText.replace(/\n\n\n+/g, match => '\n\n' + '<br>'.repeat(Math.floor((match.length - 2) / 2)) + '\n\n');
            output.innerHTML = marked.parse(processedText, { breaks: true });
            applyCustomStyles();
            if (window.MathJax) { MathJax.typesetPromise([output]); }
        }

        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('appSettings')) || {};
            document.getElementById('font-family-select').value = settings.fontFamily || 'Arial, sans-serif';
            document.getElementById('h1-color').value = settings.h1Color || '#333333';
            document.getElementById('h2-color').value = settings.h2Color || '#444444';
            document.getElementById('h3-color').value = settings.h3Color || '#555555';
            document.getElementById('italics-color').value = settings.italicsColor || '#777777';
            document.getElementById('h1-size').value = settings.h1Size || 28;
            document.getElementById('h2-size').value = settings.h2Size || 24;
            document.getElementById('h3-size').value = settings.h3Size || 20;
            document.getElementById('bold-color').value = settings.boldColor || '#000000';
            document.getElementById('math-color').value = settings.mathColor || '#555555';
            document.getElementById('math-size').value = settings.mathSize || 1;
            document.getElementById('generate-toc-checkbox').checked = settings.generateToc || false;
            
            const theme = settings.theme || 'light';
            if(document.getElementById(theme + '-theme')) document.getElementById(theme + '-theme').checked = true;
            document.body.classList.toggle('dark-mode', theme === 'dark');
            
            const printType = settings.printType || 'color';
            if(document.getElementById(printType + '-print')) document.getElementById(printType + '-print').checked = true;
            document.body.classList.toggle('grayscale-print', printType === 'grayscale');
        }

        function saveSettings() {
            const theme = document.querySelector('input[name="theme"]:checked')?.value || 'light';
            const printType = document.querySelector('input[name="print-type"]:checked')?.value || 'color';
            const settings = {
                fontFamily: document.getElementById('font-family-select').value,
                h1Color: document.getElementById('h1-color').value,
                h2Color: document.getElementById('h2-color').value,
                h3Color: document.getElementById('h3-color').value,
                italicsColor: document.getElementById('italics-color').value,
                h1Size: document.getElementById('h1-size').value,
                h2Size: document.getElementById('h2-size').value,
                h3Size: document.getElementById('h3-size').value,
                boldColor: document.getElementById('bold-color').value,
                mathColor: document.getElementById('math-color').value,
                mathSize: document.getElementById('math-size').value,
                generateToc: document.getElementById('generate-toc-checkbox').checked,
                theme: theme, printType: printType
            };
            
            localStorage.setItem('appSettings', JSON.stringify(settings));
            document.body.classList.toggle('dark-mode', theme === 'dark');
            document.body.classList.toggle('grayscale-print', printType === 'grayscale');
            applyCustomStyles(); document.getElementById('settings-modal').style.display = 'none'; renderContent();
        }

        function applyCustomStyles() {
            const settings = JSON.parse(localStorage.getItem('appSettings')) || {};
            const basePx = 16; 
            const h1Em = (settings.h1Size || 28) / basePx;
            const h2Em = (settings.h2Size || 24) / basePx;
            const h3Em = (settings.h3Size || 20) / basePx;

            // FIX: Removed CSS hacks for baseline, targeted SVG fill for correct math coloring
            const styles = `
                #rendered-output, #pdf-preview-box { font-family: ${settings.fontFamily || 'Arial, sans-serif'}; }
                #rendered-output h1, #pdf-preview-box h1 { color: ${settings.h1Color || '#333'}; font-size: ${h1Em}em; }
                #rendered-output h2, #pdf-preview-box h2 { color: ${settings.h2Color || '#444'}; font-size: ${h2Em}em; }
                #rendered-output h3, #pdf-preview-box h3 { color: ${settings.h3Color || '#555'}; font-size: ${h3Em}em; }
                #rendered-output em, #pdf-preview-box em { color: ${settings.italicsColor || '#777'}; }
                #rendered-output strong, #pdf-preview-box strong { color: ${settings.boldColor || '#000'}; }
                
                #rendered-output mjx-container, #pdf-preview-box mjx-container { 
                    color: ${settings.mathColor || '#555555'} !important; 
                    font-size: ${settings.mathSize || 1}em !important; 
                }
                #rendered-output mjx-container svg, #pdf-preview-box mjx-container svg {
                    fill: ${settings.mathColor || '#555555'} !important;
                }
            `;
            let styleTag = document.getElementById('custom-styles');
            if (!styleTag) {
                styleTag = document.createElement('style'); styleTag.id = 'custom-styles'; document.head.appendChild(styleTag);
            }
            styleTag.innerHTML = styles;
        }

        async function updatePdfPreview() {
            const rawHtml = output.innerHTML;
            const layout = document.getElementById('pdf-layout').value;
            const scaleSlider = document.getElementById('pdf-scale');
            
            pdfPreviewBox.style.setProperty('--base-font-size', `${16 * scaleSlider.value / 100}px`);

            if (layout === '2-duplicate') {
                pdfPreviewBox.innerHTML = `<div style="display: flex; gap: 15mm;"><div style="flex: 1;">${rawHtml}</div><div style="flex: 1;">${rawHtml}</div></div>`;
                pdfPreviewBox.style.columnCount = '1';
            } else if (layout === '2') {
                pdfPreviewBox.innerHTML = rawHtml;
                pdfPreviewBox.style.columnCount = '2'; pdfPreviewBox.style.columnGap = '15mm';
            } else {
                pdfPreviewBox.innerHTML = rawHtml;
                pdfPreviewBox.style.columnCount = '1';
            }

            if (window.MathJax) { await MathJax.typesetPromise([pdfPreviewBox]); }
            drawPageBreaks();
        }

        async function drawPageBreaks() {
            await new Promise(r => setTimeout(r, 50));
            const overlays = document.getElementById('pdf-page-overlays');
            overlays.innerHTML = '';
            
            const t = parseFloat(document.getElementById('m-top').value) || 0;
            const b = parseFloat(document.getElementById('m-bot').value) || 0;
            const orient = document.getElementById('pdf-orientation').value;
            const ph = orient === 'landscape' ? 210 : 297;
            const contentHeightMm = ph - t - b;

            const mmNode = document.createElement('div');
            mmNode.style.height = '100mm'; mmNode.style.position = 'absolute';
            pdfPreviewBox.appendChild(mmNode);
            const pxPerMm = mmNode.offsetHeight / 100;
            pdfPreviewBox.removeChild(mmNode);
            
            const totalHeightMm = pdfPreviewBox.scrollHeight / pxPerMm;
            const tolerance = 1.0; 
            const totalPages = Math.max(1, Math.ceil((totalHeightMm - tolerance) / contentHeightMm));
            
            for (let i = 1; i < totalPages; i++) {
                const topOffsetMm = i * contentHeightMm;
                
                const line = document.createElement('div');
                line.style.position = 'absolute'; line.style.top = topOffsetMm + 'mm';
                line.style.left = '-10mm'; line.style.right = '-10mm';
                line.style.borderBottom = '2px dashed red'; line.style.opacity = '0.6';
                
                const label = document.createElement('div');
                label.style.position = 'absolute'; label.style.top = `calc(${topOffsetMm}mm - 6mm)`;
                label.style.right = '-20mm'; label.style.color = 'red';
                label.style.fontWeight = 'bold'; label.style.fontSize = '12px';
                label.textContent = `Page ${i} Break ✂️`;
                
                overlays.appendChild(line); overlays.appendChild(label);
            }
            
            for (let i = 1; i <= totalPages; i++) {
                const topOffsetMm = i * contentHeightMm;
                const pageNum = document.createElement('div');
                pageNum.style.position = 'absolute';
                pageNum.style.top = `calc(${topOffsetMm}mm - 8mm)`; 
                pageNum.style.width = '100%'; pageNum.style.textAlign = 'center';
                pageNum.style.color = '#777'; pageNum.style.fontFamily = 'Arial';
                pageNum.style.fontSize = '12px'; pageNum.textContent = `- ${i} -`;
                overlays.appendChild(pageNum);
            }

            // Update Page Checkbox UI
            const pageContainer = document.getElementById('page-checkboxes');
            const currentlyUnchecked = Array.from(pageContainer.querySelectorAll('input:not(:checked)')).map(cb => parseInt(cb.value));
            
            pageContainer.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const label = document.createElement('label');
                label.className = 'page-checkbox-label';
                
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = i;
                cb.checked = !currentlyUnchecked.includes(i);
                
                label.appendChild(cb);
                label.appendChild(document.createTextNode(`Pg ${i}`));
                pageContainer.appendChild(label);
            }
        }

        function applyDeskDimensions() {
            const marginSelect = document.getElementById('pdf-margins');
            const customDiv = document.getElementById('custom-margins-div');
            let t, b, l, r;
            
            if (marginSelect.value === 'custom') {
                customDiv.style.display = 'flex';
                t = parseFloat(document.getElementById('m-top').value) || 0;
                b = parseFloat(document.getElementById('m-bot').value) || 0;
                l = parseFloat(document.getElementById('m-left').value) || 0;
                r = parseFloat(document.getElementById('m-right').value) || 0;
            } else {
                customDiv.style.display = 'none';
                t = b = l = r = parseFloat(marginSelect.options[marginSelect.selectedIndex].dataset.val);
                document.getElementById('m-top').value = t; document.getElementById('m-bot').value = b;
                document.getElementById('m-left').value = l; document.getElementById('m-right').value = r;
            }
            
            const orient = document.getElementById('pdf-orientation').value;
            const pw = orient === 'landscape' ? 297 : 210; const ph = orient === 'landscape' ? 210 : 297;
            
            pdfDesk.style.setProperty('--pw', `${pw}mm`); pdfDesk.style.setProperty('--ph', `${ph}mm`);
            pdfDesk.style.setProperty('--mt', `${t}mm`); pdfDesk.style.setProperty('--mb', `${b}mm`);
            pdfDesk.style.setProperty('--ml', `${l}mm`); pdfDesk.style.setProperty('--mr', `${r}mm`);
            pdfDesk.style.setProperty('--ch', `${ph - t - b}mm`);
            
            updatePdfPreview();
        }

        const scaleSlider = document.getElementById('pdf-scale');
        const scaleDownBtn = document.getElementById('scale-down-btn');
        const scaleUpBtn = document.getElementById('scale-up-btn');
        const scaleValTxt = document.getElementById('pdf-scale-val');

        function updateScale(newVal) {
            if (newVal < 50) newVal = 50; if (newVal > 200) newVal = 200;
            scaleSlider.value = newVal; scaleValTxt.textContent = newVal + '%';
            clearTimeout(pdfUpdateTimer); pdfUpdateTimer = setTimeout(updatePdfPreview, 100);
        }

        scaleDownBtn.addEventListener('click', () => updateScale(parseInt(scaleSlider.value) - 1));
        scaleUpBtn.addEventListener('click', () => updateScale(parseInt(scaleSlider.value) + 1));
        scaleSlider.addEventListener('input', (e) => {
            scaleValTxt.textContent = e.target.value + '%';
            clearTimeout(pdfUpdateTimer); pdfUpdateTimer = setTimeout(updatePdfPreview, 100);
        });

        document.getElementById('share-pdf-btn').addEventListener('click', () => {
            if (isEditorView) { renderContent(); saveEditorContent(); }
            pdfModal.style.display = 'block'; applyDeskDimensions();
        });

        ['pdf-orientation', 'pdf-layout', 'pdf-margins'].forEach(id => document.getElementById(id).addEventListener('change', applyDeskDimensions));
        ['m-top', 'm-bot', 'm-left', 'm-right'].forEach(id => document.getElementById(id).addEventListener('input', applyDeskDimensions));

        executeShareBtn.addEventListener('click', async () => {
            const selectedPages = Array.from(document.querySelectorAll('#page-checkboxes input:checked')).map(cb => parseInt(cb.value));
            
            if (selectedPages.length === 0) {
                alert("You must select at least one page to export.");
                return;
            }

            executeShareBtn.disabled = true; executeShareBtn.textContent = 'Generating PDF...';
            const orient = document.getElementById('pdf-orientation').value;
            const t = parseFloat(document.getElementById('m-top').value) || 0;
            const b = parseFloat(document.getElementById('m-bot').value) || 0;
            const l = parseFloat(document.getElementById('m-left').value) || 0;
            const r = parseFloat(document.getElementById('m-right').value) || 0;

            deskContainer.style.zoom = '1';
            const opt = {
                margin: [t, l, b, r], filename: 'document.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: orient }
            };

            try {
                const pdf = await html2pdf().set(opt).from(pdfPreviewBox).toPdf().get('pdf').then(pdf => {
                    const generatedTotalPages = pdf.internal.getNumberOfPages();
                    
                    for (let i = generatedTotalPages; i >= 1; i--) {
                        if (!selectedPages.includes(i)) {
                            pdf.deletePage(i);
                        }
                    }

                    const finalPagesCount = pdf.internal.getNumberOfPages();
                    for (let i = 1; i <= finalPagesCount; i++) {
                        pdf.setPage(i); 
                        pdf.setFontSize(10); 
                        pdf.setTextColor(150);
                        const pw = pdf.internal.pageSize.getWidth(); 
                        const ph = pdf.internal.pageSize.getHeight();
                        pdf.text('- ' + i + ' -', pw / 2, ph - (b / 2), { align: 'center' });
                    }
                    return pdf;
                });

                const pdfBlob = pdf.output('blob');
                const file = new File([pdfBlob], "document.pdf", { type: "application/pdf" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ title: 'Markdown Document', files: [file] });
                } else {
                    const url = URL.createObjectURL(pdfBlob); const a = document.createElement('a'); 
                    a.href = url; a.download = 'document.pdf'; document.body.appendChild(a); 
                    a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                    alert("Direct sharing unsupported. Downloaded instead.");
                }
            } catch (error) {
                console.error("PDF generation failed:", error); alert("Failed to generate PDF.");
            } finally {
                deskContainer.style.zoom = '0.6'; 
                executeShareBtn.disabled = false; executeShareBtn.textContent = 'Generate & Share PDF';
            }
        });

        // Core UI Listeners
        document.getElementById('download-btn').addEventListener('click', () => {
            const blob = new Blob([editor.value], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); 
            a.href = url; a.download = 'document.md'; document.body.appendChild(a); 
            a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        });
        
        document.getElementById('open-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (event) => {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader(); 
            reader.onload = (e) => { editor.value = e.target.result; renderContent(); saveEditorContent(); };
            reader.readAsText(file); event.target.value = '';
        });
        
        editor.addEventListener('input', () => { renderContent(); saveEditorContent(); });
        
        document.getElementById('clear-btn').addEventListener('click', () => { editor.value = ''; renderContent(); saveEditorContent(); });

        document.getElementById('add-test-btn').addEventListener('click', () => { 
            editor.value = `# My Markdown Document\n\nThis is a table with grid lines:\n\n| Feature | Description | Status |\n| :--- | :--- | :--- |\n| Math Baseline | Flawless SVG | ✅ |\n| Native Print | Margins Fixed | ✅ |\n\n## Mathematical Formulas\n\n$$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$`; 
            renderContent(); saveEditorContent(); document.getElementById('settings-modal').style.display = 'none'; 
        });

        toggleBtn.addEventListener('click', () => {
            isEditorView = !isEditorView; editor.style.display = isEditorView ? 'block' : 'none';
            output.style.display = isEditorView ? 'none' : 'block'; 
            if (!isEditorView) { renderContent(); saveEditorContent(); }
        });
        
        document.getElementById('print-btn').addEventListener('click', () => {
            if (isEditorView) { isEditorView = false; editor.style.display = 'none'; output.style.display = 'block'; renderContent(); saveEditorContent(); }
            window.print();
        });
        
        document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('settings-modal').style.display = 'block');
        document.getElementById('close-settings').addEventListener('click', () => document.getElementById('settings-modal').style.display = 'none');
        document.getElementById('close-pdf-modal').addEventListener('click', () => pdfModal.style.display = 'none');
        document.getElementById('save-settings-btn').addEventListener('click', saveSettings);
        
        loadSettings(); loadEditorContent(); renderContent();
    </script>
</body>
</html>
