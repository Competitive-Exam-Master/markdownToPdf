<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown & MathJax App</title>
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
            chtml: { displayAlign: 'left' },
            options: { enableMenu: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; display: flex; flex-direction: column; gap: 15px; }
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode .modal-content, body.dark-mode #markdown-editor, body.dark-mode #rendered-output { background-color: #1e1e1e; color: #e0e0e0; border-color: #333; }
        
        #markdown-editor, #rendered-output { width: 100%; height: 70vh; padding: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; background-color: white; font-size: 16px; }
        #rendered-output { overflow-y: auto; display: none; }
        #rendered-output table, #pdf-preview-box table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
        #rendered-output th, #rendered-output td, #pdf-preview-box th, #pdf-preview-box td { border: 1px solid #ccc; padding: 8px 12px; }

        /* SAFETY: Prevent splitting math/headings/tables across pages */
        #pdf-preview-box h1, #pdf-preview-box h2, #pdf-preview-box h3, 
        #pdf-preview-box tr, #pdf-preview-box p, #pdf-preview-box li,
        #pdf-preview-box mjx-container {
            page-break-inside: avoid !important;
            break-inside: avoid !important;
        }

        .page-break { page-break-before: always; break-before: page; height: 0px; display: block; border: none; position: relative; }
        .pdf-preview-wrapper .page-break::after { content: "Manual Break ✂️"; position: absolute; top: -10px; right: 0; color: #007bff; font-size: 11px; font-weight: bold; background: white; padding: 0 5px; border-bottom: 2px dashed #007bff; width: 100%; text-align: right; }

        .header { display: flex; justify-content: flex-end; gap: 10px; padding-bottom: 5px; }
        .header button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; background-color: #007bff; color: white; font-size: 20px; }
        
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 20px; border-radius: 10px; width: 90%; max-width: 1000px; }
        .pdf-panel-body { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 15px; }
        .pdf-controls { flex: 1; min-width: 250px; display: flex; flex-direction: column; gap: 15px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .pdf-preview-wrapper { flex: 2; min-width: 300px; height: 600px; background: #525659; padding: 20px; overflow: auto; border-radius: 8px; text-align: center; }
        #pdf-desk-container { display: inline-block; text-align: left; zoom: 0.6; }
        #pdf-desk { background-color: white; width: 210mm; padding: 12.7mm; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        #pdf-preview-box { color: black; width: 100%; min-height: 271.6mm; background-color: white; }
        
        #page-checkboxes { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
        .page-checkbox-label { display: flex; align-items: center; gap: 4px; font-size: 13px; background: #e9ecef; padding: 4px 8px; border-radius: 4px; }
        
        @media print {
            .header, #markdown-editor, .modal { display: none !important; }
            #rendered-output { display: block !important; height: auto !important; border: none !important; padding: 0 !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="toggle-view-btn">↔️</button>
        <button id="clear-btn">🗑️</button>
        <button id="download-btn">💾</button>
        <button id="insert-break-btn">✂️</button>
        <button id="print-btn">🖨️</button>
        <button id="share-pdf-btn">📤</button>
    </div>

    <textarea id="markdown-editor" placeholder="Type here..."></textarea>
    <div id="rendered-output"></div>

    <div id="pdf-share-modal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:24px;" onclick="document.getElementById('pdf-share-modal').style.display='none'">&times;</span>
            <h2>PDF Export</h2>
            <div class="pdf-panel-body">
                <div class="pdf-controls">
                    <div><label>Content Scale: <span id="scale-val">100%</span></label>
                        <input type="range" id="pdf-scale" min="50" max="150" value="100" style="width:100%"></div>
                    <div id="page-selection-container"><label>Select Pages:</label><div id="page-checkboxes"></div></div>
                    <button id="generate-pdf-btn" style="margin-top:auto; padding:12px; background:#28a745; color:white; border:none; border-radius:5px;">1. Generate PDF</button>
                    <div id="post-generate-actions" style="display:none; gap:10px;">
                        <button id="share-btn" style="flex:1; padding:10px; background:#007bff; color:white; border:none; border-radius:5px;">Share</button>
                        <button id="download-gen-btn" style="flex:1; padding:10px; background:#17a2b8; color:white; border:none; border-radius:5px;">Download</button>
                    </div>
                </div>
                <div class="pdf-preview-wrapper">
                    <div id="pdf-desk-container"><div id="pdf-desk"><div id="pdf-preview-box"></div></div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        const editor = document.getElementById('markdown-editor');
        const output = document.getElementById('rendered-output');
        const pdfPreviewBox = document.getElementById('pdf-preview-box');
        const generatePdfBtn = document.getElementById('generate-pdf-btn');
        const postActions = document.getElementById('post-generate-actions');
        
        let currentPdfBlob = null, currentPdfFile = null, isEditorView = true;

        function renderContent() {
            let text = editor.value;
            let processed = text.replace(/(\$\$?)([\s\S]*?)\1/g, (m, d, content) => {
                return d + content.replace(/%/g, '\\%').replace(/₹/g, '\\text{₹}') + d;
            });
            output.innerHTML = marked.parse(processed, { breaks: true });
            if (window.MathJax) MathJax.typesetPromise([output]);
            resetPdfBtn();
        }

        async function updatePdfPreview() {
            pdfPreviewBox.innerHTML = output.innerHTML;
            if (window.MathJax) await MathJax.typesetPromise([pdfPreviewBox]);
            
            const pageHeightPx = 1120; // Estimated A4 height
            const totalPages = Math.ceil(pdfPreviewBox.scrollHeight / pageHeightPx) || 1;
            const pageContainer = document.getElementById('page-checkboxes');
            pageContainer.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                pageContainer.innerHTML += `<label class="page-checkbox-label"><input type="checkbox" value="${i}" checked> Pg ${i}</label>`;
            }
        }

        function resetPdfBtn() {
            generatePdfBtn.style.display = 'block';
            generatePdfBtn.disabled = false;
            generatePdfBtn.textContent = '1. Generate PDF';
            postActions.style.display = 'none';
        }

        generatePdfBtn.addEventListener('click', async () => {
            const selected = Array.from(document.querySelectorAll('#page-checkboxes input:checked')).map(cb => parseInt(cb.value));
            if (!selected.length) return alert("Select a page");

            generatePdfBtn.disabled = true;
            generatePdfBtn.textContent = 'Generating...';
            document.getElementById('pdf-desk-container').style.zoom = "1";
            
            const opt = {
                margin: [12.7, 12.7, 15, 12.7],
                filename: 'document.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] }
            };

            try {
                const pdf = await html2pdf().set(opt).from(pdfPreviewBox).toPdf().get('pdf').then(pdf => {
                    const total = pdf.internal.getNumberOfPages();
                    for (let i = total; i >= 1; i--) if (!selected.includes(i)) pdf.deletePage(i);
                    const finalTotal = pdf.internal.getNumberOfPages();
                    for (let i = 1; i <= finalTotal; i++) {
                        pdf.setPage(i);
                        pdf.setFontSize(10);
                        pdf.setTextColor(150);
                        pdf.text(`- ${i} -`, pdf.internal.pageSize.getWidth() / 2, pdf.internal.pageSize.getHeight() - 10, { align: 'center' });
                    }
                    return pdf;
                });

                currentPdfBlob = pdf.output('blob');
                currentPdfFile = new File([currentPdfBlob], "document.pdf", { type: "application/pdf" });
                generatePdfBtn.style.display = 'none';
                postActions.style.display = 'flex';
            } catch (e) {
                alert("Error: " + e.message);
                generatePdfBtn.disabled = false;
            } finally {
                document.getElementById('pdf-desk-container').style.zoom = "0.6";
            }
        });

        document.getElementById('share-btn').addEventListener('click', async () => {
            if (navigator.share && currentPdfFile) await navigator.share({ files: [currentPdfFile] });
        });

        document.getElementById('download-gen-btn').addEventListener('click', () => {
            const url = URL.createObjectURL(currentPdfBlob);
            const a = document.createElement('a'); a.href = url; a.download = "document.pdf"; a.click();
        });

        document.getElementById('insert-break-btn').addEventListener('click', () => {
            const pos = editor.selectionStart;
            const tag = '\n<div class="page-break"></div>\n';
            editor.value = editor.value.substring(0, pos) + tag + editor.value.substring(pos);
            renderContent();
        });

        document.getElementById('share-pdf-btn').addEventListener('click', () => {
            document.getElementById('pdf-share-modal').style.display = 'block';
            updatePdfPreview();
        });

        document.getElementById('toggle-view-btn').addEventListener('click', () => {
            isEditorView = !isEditorView;
            editor.style.display = isEditorView ? 'block' : 'none';
            output.style.display = isEditorView ? 'none' : 'block';
            if (!isEditorView) renderContent();
        });

        document.getElementById('print-btn').onclick = () => window.print();
        editor.oninput = renderContent;
        window.onload = renderContent;
    </script>
</body>
</html>
